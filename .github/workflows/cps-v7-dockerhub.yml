name: build-release cps-v7

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fixture smoke tests (Docker)
        run: |
          docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from calibre-perl-server

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image tags
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          IMAGE="icyavocado/calibre-perl-server"
          docker build -t "${IMAGE}:latest" -t "${IMAGE}:${SHORT_SHA}" .

      - name: Push Docker image
        run: |
          IMAGE="icyavocado/calibre-perl-server"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${SHORT_SHA}"
