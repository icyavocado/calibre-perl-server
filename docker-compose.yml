services:
  calibre-perl-server:
    build: .
    volumes:
      - .:/app
      - /home/dai/CalibreLibrary:/calibre:ro
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - calibre-perl-server
    ports:
      - "127.0.0.1:5000:80"
    volumes:
      - .:/app:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
