worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 1024;
  gzip_types text/css application/javascript application/json application/xml text/xml text/plain text/html image/svg+xml;

  proxy_cache_path /var/cache/nginx/calibre levels=1:2 keys_zone=calibre_cache:32m max_size=256m inactive=60m use_temp_path=off;

  upstream calibre_app {
    server calibre-perl-server:5000;
  }

  map $request_method $cacheable_method {
    default 0;
    GET 1;
    HEAD 1;
  }

  map $uri $skip_cache_route {
    default 0;
    /login 1;
    /logout 1;
  }

  map $auth_state $auth_state_bucket {
    default anonymous;
    authenticated authenticated;
    anonymous anonymous;
    public public;
  }

  map $http_user_agent $ereader_user_agent {
    default normal;
    ~*(kindle|kobo|pocketbook|boox|onyx|eink|e-ink|ereader) reader;
  }

  map $arg_view $reader_mode_arg {
    default "";
    reader reader;
    normal normal;
  }

  map "$reader_mode_arg:$ereader_user_agent" $anonymous_reader_mode {
    default normal;
    reader:normal reader;
    reader:reader reader;
    normal:normal normal;
    normal:reader normal;
    :reader reader;
  }

  map "$reader_mode_auth:$reader_mode_arg:$ereader_user_agent" $reader_mode_bucket {
    default normal;
    ~^reader: reader;
    ~^normal: normal;
    ~^:reader: reader;
    ~^:normal: normal;
    ~^::reader$ reader;
  }

  map "$http_authorization:$http_cookie" $needs_auth_state_backend {
    default 1;
    ~^:$ 0;
  }

  map "$cacheable_method:$skip_cache_route" $skip_proxy_cache {
    default 1;
    1:0 0;
  }

  map $status $cover_cache_control {
    default "no-store";
    200 "public, max-age=2592000";
    404 "public, max-age=600";
  }

  server {
    listen 80;
    server_name _;

    root /app/public;

    location /css/ {
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, immutable" always;
      try_files $uri =404;
    }

    location = /favicon.ico {
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, immutable" always;
      try_files $uri =404;
    }

    location /cover/ {
      auth_request /__auth_state;
      auth_request_set $auth_state $upstream_http_x_auth_state;

      proxy_cache calibre_cache;
      proxy_cache_methods GET HEAD;
      proxy_cache_key "$scheme$request_method$host$request_uri|$auth_state_bucket";
      proxy_cache_valid 200 30d;
      proxy_cache_valid 302 1m;
      proxy_cache_valid 404 10m;
      add_header Cache-Control $cover_cache_control always;
      add_header X-Proxy-Cache $upstream_cache_status always;
      add_header X-Auth-State-Bucket $auth_state_bucket always;

      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://calibre_app;
    }

    location / {
      auth_request /__auth_state;
      auth_request_set $auth_state $upstream_http_x_auth_state;
      auth_request_set $reader_mode_auth $upstream_http_x_reader_mode;

      proxy_cache calibre_cache;
      proxy_cache_methods GET HEAD;
      proxy_cache_key "$scheme$request_method$host$request_uri|$auth_state_bucket|$reader_mode_bucket";
      proxy_cache_bypass $skip_proxy_cache;
      proxy_no_cache $skip_proxy_cache;
      proxy_cache_valid 200 302 10m;
      proxy_cache_valid 404 1m;
      add_header X-Proxy-Cache $upstream_cache_status always;
      add_header X-Auth-State-Bucket $auth_state_bucket always;
      add_header X-Reader-Mode $reader_mode_bucket always;

      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://calibre_app;
    }

    location = /__auth_state {
      internal;

      if ($needs_auth_state_backend = 0) {
        add_header X-Auth-State anonymous always;
        add_header X-Reader-Mode $anonymous_reader_mode always;
        return 204;
      }

      proxy_pass http://calibre_app/__auth_state;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
